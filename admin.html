<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Administration</title>
  <style>
    :root {
      --red: #e60000;
      --red-hover: #b30000;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ddd;
      --text: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header identité */
    .identity-bar {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .identity-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .identity-text .name {
      font-weight: 600;
    }

    .identity-text .details {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-logout:hover {
      background: var(--red);
      color: #fff;
    }

    /* Sections */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .badge {
      background: var(--red);
      color: #fff;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-sm {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: #eee;
      border-color: #aaa;
    }

    .btn-sm.add {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-sm.add:hover {
      background: var(--red);
      color: #fff;
    }

    .list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 10px;
    }

    .list-item:last-child { border-bottom: none; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      flex-shrink: 0;
      color: #666;
    }

    .user-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .user-nivol {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .user-func {
      font-size: 0.8rem;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      color: #555;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.delete:hover { color: var(--red); background: #fff0f0; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 1.1rem; }

    .modal input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-cancel { background: #eee; color: #333; }
    .btn-save { background: var(--red); color: #fff; }
    .btn-danger { background: #c00; color: #fff; }

    /* Responsive */
    @media (max-width: 480px) {
      .identity-bar { flex-direction: column; align-items: flex-start; }
      .list-item { flex-direction: column; align-items: flex-start; }
      .item-actions { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barre d'identité -->
    <div class="identity-bar">
      <div class="identity-info">
        <div class="avatar" id="avatar-initial"></div>
        <div class="identity-text">
          <div class="name" id="identity-name"></div>
          <div class="details" id="identity-details"></div>
        </div>
      </div>
      <button class="btn-logout" id="logout-btn">Déconnexion</button>
    </div>

    <!-- Administrateurs -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Administrateurs</h2>
          <span class="badge" id="admin-count">0</span>
        </div>
        <div class="actions" id="admin-actions"></div>
      </div>
      <ul class="list" id="admin-list"></ul>
    </div>

    <!-- Utilisateurs -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Utilisateurs</h2>
          <span class="badge" id="user-count">0</span>
        </div>
        <div class="actions" id="user-actions"></div>
      </div>
      <ul class="list" id="user-list"></ul>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Ordre hiérarchique (index 0 = plus haut)
    const HIERARCHY = ['Dieu', 'PUL', 'MOT'];

    function getHierarchyLevel(fonction) {
      const idx = HIERARCHY.indexOf(fonction);
      return idx === -1 ? HIERARCHY.length : idx; // "Autre" = niveau le plus bas
    }

    // Mon niveau est-il strictement supérieur à celui de la cible ?
    function isStrictlyAbove(myFonc, targetFonc) {
      return getHierarchyLevel(myFonc) < getHierarchyLevel(targetFonc);
    }

    // Mon niveau est-il supérieur ou égal à celui de la cible ?
    function isAboveOrEqual(myFonc, targetFonc) {
      return getHierarchyLevel(myFonc) <= getHierarchyLevel(targetFonc);
    }

    // Puis-je attribuer cette fonction ?
    function canAssignFunction(myFonc, functionToAssign) {
      if (myFonc === 'Dieu') return true;
      // Ne peut pas attribuer Dieu
      if (functionToAssign === 'Dieu') return false;
      if (myFonc === 'PUL') {
        // PUL ne peut pas s'auto-attribuer ni attribuer PUL (sauf Dieu)
        return functionToAssign !== 'PUL';
      }
      // MOT et autres : ne peuvent attribuer que des fonctions de niveau inférieur ou égal au leur
      // mais jamais Dieu ni PUL
      if (functionToAssign === 'PUL') return false;
      return isAboveOrEqual(myFonc, functionToAssign);
    }

    let currentAdmin = null;
    let admins = [];
    let users = [];

    // DOM
    const avatarInitial = document.getElementById('avatar-initial');
    const identityName = document.getElementById('identity-name');
    const identityDetails = document.getElementById('identity-details');
    const adminCount = document.getElementById('admin-count');
    const userCount = document.getElementById('user-count');
    const adminList = document.getElementById('admin-list');
    const userList = document.getElementById('user-list');
    const adminActions = document.getElementById('admin-actions');
    const userActions = document.getElementById('user-actions');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');

    // Vérification connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = './login.html'; return; }
      const nivol = user.displayName;
      if (!nivol) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        if (!adminSnap.exists()) {
          await deleteUser(user).catch(() => {});
          window.location.href = './login.html';
          return;
        }

        currentAdmin = {
          nivol,
          nom: adminSnap.data().I || 'Inconnu',
          fonction: adminSnap.data().F || ''
        };

        // Affichage identité
        const initial = (currentAdmin.nom.charAt(0) || '?').toUpperCase();
        avatarInitial.textContent = initial;
        identityName.textContent = currentAdmin.nom;
        identityDetails.textContent = `NIVOL : ${currentAdmin.nivol}${currentAdmin.fonction ? ' · ' + currentAdmin.fonction : ''}`;

        await loadAllData();

      } catch (err) {
        console.error(err);
        if (auth.currentUser) await deleteUser(auth.currentUser).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Déconnexion
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
      }
    });

    async function loadAllData() {
      const adminSnap = await getDocs(collection(db, 'A'));
      admins = [];
      adminSnap.forEach(d => admins.push({ nivol: d.id, nom: d.data().I || 'Inconnu', fonction: d.data().F || '' }));
      renderAdminList();

      const userSnap = await getDocs(collection(db, 'U'));
      users = [];
      userSnap.forEach(d => users.push({ nivol: d.id, nom: d.data().I || 'Inconnu' }));
      renderUserList();
    }

    function canEditAnything() {
      if (!currentAdmin) return false;
      return HIERARCHY.includes(currentAdmin.fonction);
    }

    // Rendu liste admins
    function renderAdminList() {
      adminList.innerHTML = '';
      adminCount.textContent = admins.length;
      adminActions.innerHTML = '';

      if (canEditAnything()) {
        const btn = document.createElement('button');
        btn.className = 'btn-sm add';
        btn.textContent = '+ Ajouter';
        btn.addEventListener('click', () => openAddModal('A'));
        adminActions.appendChild(btn);
      }

      admins.forEach(a => {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.innerHTML = `
          <div class="user-info">
            <div class="user-avatar">${(a.nom.charAt(0)||'?').toUpperCase()}</div>
            <div>
              <div class="user-name">${a.nom}</div>
              <div class="user-nivol">${a.nivol}</div>
            </div>
            <span class="user-func">${a.fonction || '—'}</span>
          </div>
          <div class="item-actions"></div>
        `;
        const actionsDiv = li.querySelector('.item-actions');

        // Peut modifier si strictement supérieur OU si c'est soi-même
        const canModify = canEditAnything() && (isStrictlyAbove(currentAdmin.fonction, a.fonction) || a.nivol === currentAdmin.nivol);
        const canDelete = canEditAnything() && isStrictlyAbove(currentAdmin.fonction, a.fonction);

        if (canModify) {
          const editBtn = document.createElement('button');
          editBtn.className = 'btn-icon';
          editBtn.textContent = '✏️';
          editBtn.title = 'Modifier';
          editBtn.addEventListener('click', () => openEditModal('A', a));
          actionsDiv.appendChild(editBtn);
        }

        if (canDelete) {
          const delBtn = document.createElement('button');
          delBtn.className = 'btn-icon delete';
          delBtn.textContent = '🗑️';
          delBtn.title = 'Supprimer';
          delBtn.addEventListener('click', () => confirmDelete('A', a));
          actionsDiv.appendChild(delBtn);
        }

        adminList.appendChild(li);
      });
    }

    // Rendu liste users
    function renderUserList() {
      userList.innerHTML = '';
      userCount.textContent = users.length;
      userActions.innerHTML = '';

      if (canEditAnything()) {
        const btn = document.createElement('button');
        btn.className = 'btn-sm add';
        btn.textContent = '+ Ajouter';
        btn.addEventListener('click', () => openAddModal('U'));
        userActions.appendChild(btn);
      }

      users.forEach(u => {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.innerHTML = `
          <div class="user-info">
            <div class="user-avatar">${(u.nom.charAt(0)||'?').toUpperCase()}</div>
            <div>
              <div class="user-name">${u.nom}</div>
              <div class="user-nivol">${u.nivol}</div>
            </div>
          </div>
          <div class="item-actions"></div>
        `;
        const actionsDiv = li.querySelector('.item-actions');

        if (canEditAnything()) {
          const editBtn = document.createElement('button');
          editBtn.className = 'btn-icon';
          editBtn.textContent = '✏️';
          editBtn.title = 'Modifier';
          editBtn.addEventListener('click', () => openEditModal('U', u));
          actionsDiv.appendChild(editBtn);

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-icon delete';
          delBtn.textContent = '🗑️';
          delBtn.title = 'Supprimer';
          delBtn.addEventListener('click', () => confirmDelete('U', u));
          actionsDiv.appendChild(delBtn);
        }

        userList.appendChild(li);
      });
    }

    // Modal Ajouter
    function openAddModal(collectionName) {
      const isAdmin = collectionName === 'A';
      modalContent.innerHTML = `
        <h3>Ajouter un ${isAdmin ? 'administrateur' : 'utilisateur'}</h3>
        <input type="text" id="modal-nivol" placeholder="NIVOL (12 car.)" pattern="[0-9A-Za-z]{12}" maxlength="12">
        <input type="text" id="modal-nom" placeholder="Prénom Nom">
        ${isAdmin ? '<input type="text" id="modal-fonction" placeholder="Fonction (laisser vide = Autre)">' : ''}
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Ajouter</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nivol = document.getElementById('modal-nivol').value.trim().toUpperCase();
        const nom = document.getElementById('modal-nom').value.trim();
        const fonction = isAdmin ? document.getElementById('modal-fonction').value.trim() : '';

        if (!/^[0-9A-Z]{12}$/.test(nivol)) return alert('NIVOL invalide (12 caractères alphanumériques)');
        if (!nom) return alert('Nom requis');

        // Vérifier permissions sur la fonction attribuée
        if (isAdmin && fonction && !canAssignFunction(currentAdmin.fonction, fonction)) {
          return alert(`Vous ne pouvez pas attribuer la fonction "${fonction}".`);
        }

        // Vérifier que le NIVOL n'existe pas déjà
        const [existsInA, existsInU] = await Promise.all([
          getDoc(doc(db, 'A', nivol)),
          getDoc(doc(db, 'U', nivol))
        ]);
        if (existsInA.exists() || existsInU.exists()) {
          return alert('Ce NIVOL existe déjà.');
        }

        try {
          const data = { I: nom };
          if (isAdmin && fonction) data.F = fonction;
          await setDoc(doc(db, collectionName, nivol), data);
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Modal Modifier
    function openEditModal(collectionName, item) {
      const isAdmin = collectionName === 'A';
      const isSelf = item.nivol === currentAdmin.nivol;

      modalContent.innerHTML = `
        <h3>Modifier ${item.nom}</h3>
        <input type="text" id="modal-nom" value="${item.nom}" placeholder="Prénom Nom">
        ${isAdmin ? `<input type="text" id="modal-fonction" value="${item.fonction || ''}" placeholder="Fonction">` : ''}
        <p style="font-size:0.85rem;color:#666;">NIVOL : ${item.nivol} (non modifiable)</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Enregistrer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nom = document.getElementById('modal-nom').value.trim();
        const fonctionInput = isAdmin ? document.getElementById('modal-fonction') : null;
        const nouvelleFonction = fonctionInput ? fonctionInput.value.trim() : undefined;

        if (!nom) return alert('Nom requis');

        // Si admin, vérifier permissions sur la fonction
        if (isAdmin && nouvelleFonction !== undefined) {
          const oldFonction = item.fonction || '';

          // Si on modifie sa propre fonction
          if (isSelf && nouvelleFonction !== oldFonction) {
            return alert('Vous ne pouvez pas modifier votre propre fonction.');
          }

          // Si on essaie de changer la fonction de quelqu'un d'autre
          if (!isSelf && nouvelleFonction !== oldFonction) {
            if (!canAssignFunction(currentAdmin.fonction, nouvelleFonction)) {
              return alert(`Vous ne pouvez pas attribuer la fonction "${nouvelleFonction}".`);
            }
          }
        }

        try {
          const data = { I: nom };
          if (isAdmin && nouvelleFonction !== undefined) {
            data.F = nouvelleFonction;
          }
          await setDoc(doc(db, collectionName, item.nivol), data, { merge: true });
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Confirmation suppression
    function confirmDelete(collectionName, item) {
      if (item.nivol === currentAdmin.nivol) {
        return alert('Vous ne pouvez pas vous supprimer vous-même.');
      }

      modalContent.innerHTML = `
        <h3>Confirmer la suppression</h3>
        <p>Supprimer définitivement <strong>${item.nom}</strong> (${item.nivol}) ?</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-danger" id="modal-delete">Supprimer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-delete').addEventListener('click', async () => {
        try {
          await deleteDoc(doc(db, collectionName, item.nivol));
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function closeModal() {
      modalOverlay.style.display = 'none';
      modalContent.innerHTML = '';
    }

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  </script>
</body>
</html>
