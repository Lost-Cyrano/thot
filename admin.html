<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Administration</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 10px; padding: 20px; margin-top: 20px; }
    .loader { color: #666; }
    button { padding: 10px 20px; background: #e60000; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #b30000; }
  </style>
</head>
<body>
  <h1>Thot – Panneau d'administration</h1>
  <div id="infos-compte" class="card" style="display:none;">
    <p><strong>Nom :</strong> <span id="nom"></span></p>
    <p><strong>NIVOL :</strong> <span id="nivol"></span></p>
    <p><strong>Fonction :</strong> <span id="fonction"></span></p>
    <button id="logout-btn">Se déconnecter (session supprimée)</button>
  </div>
  <div id="loader" class="loader">Vérification de votre identité...</div>
  <div id="error" class="error" style="display:none; color:red;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const infosDiv = document.getElementById('infos-compte');
    const loaderDiv = document.getElementById('loader');
    const errorDiv = document.getElementById('error');
    const nomSpan = document.getElementById('nom');
    const nivolSpan = document.getElementById('nivol');
    const fonctionSpan = document.getElementById('fonction');
    const logoutBtn = document.getElementById('logout-btn');

    // Vérification de l'état de connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        // Pas connecté → retour connexion
        window.location.href = './login.html';
        return;
      }

      // Récupérer le NIVOL depuis le profil Auth
      const nivol = user.displayName;
      if (!nivol) {
        // Pas de NIVOL stocké → anomalie
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
        return;
      }

      try {
        // Vérifier dans Firestore que c'est bien un admin
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        
        if (!adminSnap.exists()) {
          // N'est pas admin → expulsion
          await deleteUser(user).catch(() => {});
          window.location.href = './login.html';
          return;
        }

        // Récupérer les données depuis Firestore (source unique de vérité)
        const data = adminSnap.data();
        
        // Afficher les informations
        nomSpan.textContent = data.I || 'Inconnu';
        nivolSpan.textContent = nivol;
        fonctionSpan.textContent = data.F || 'Non définie';

        // Afficher la carte et cacher le loader
        loaderDiv.style.display = 'none';
        infosDiv.style.display = 'block';

      } catch (error) {
        console.error('Erreur de vérification:', error);
        loaderDiv.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Erreur lors de la vérification de vos droits.';
        
        // Nettoyer la session en cas d'erreur
        if (auth.currentUser) {
          await deleteUser(auth.currentUser).catch(() => {});
        }
        setTimeout(() => { window.location.href = './login.html'; }, 2000);
      }
    });

    // Déconnexion = suppression du compte anonyme
    logoutBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        try {
          await deleteUser(user);  // Supprime définitivement le compte anonyme
          window.location.href = './login.html';
        } catch (error) {
          console.error('Erreur déconnexion:', error);
          alert('Erreur lors de la déconnexion.');
        }
      }
    });
  </script>
</body>
</html>
