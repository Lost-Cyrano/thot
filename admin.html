<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Administration</title>
  <style>
    :root {
      --red: #e60000;
      --red-hover: #b30000;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ddd;
      --text: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header identité */
    .identity-bar {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .identity-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .identity-text .name {
      font-weight: 600;
    }

    .identity-text .details {
      color: var(--text-light);
      font-size: 0.85rem;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-logout:hover {
      background: var(--red);
      color: #fff;
    }

    .btn-inventory {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-inventory:hover {
      background: var(--red-hover);
    }

    /* Sections */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .badge {
      background: var(--red);
      color: #fff;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-sm {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: #eee;
      border-color: #aaa;
    }

    .btn-sm.add {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-sm.add:hover {
      background: var(--red);
      color: #fff;
    }

    .list {
      list-style: none;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 10px;
    }

    .list-item:last-child { border-bottom: none; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      flex-shrink: 0;
      color: #666;
    }

    .user-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .user-nivol {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .user-func {
      font-size: 0.8rem;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      color: #555;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.delete:hover { color: var(--red); background: #fff0f0; }

    /* Bouton Afficher plus */
    .show-more {
      padding: 10px 18px;
      text-align: center;
      color: var(--red);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border-top: 1px solid #f0f0f0;
      transition: background 0.2s;
    }

    .show-more:hover {
      background: #fafafa;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 1.1rem; }

    .modal input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-cancel { background: #eee; color: #333; }
    .btn-save { background: var(--red); color: #fff; }
    .btn-danger { background: #c00; color: #fff; }

    /* Responsive */
    @media (max-width: 480px) {
      .identity-bar { flex-direction: column; align-items: flex-start; }
      .header-buttons { width: 100%; justify-content: flex-end; }
      .list-item { flex-direction: column; align-items: flex-start; }
      .item-actions { align-self: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barre d'identité -->
    <div class="identity-bar">
      <div class="identity-info">
        <div class="avatar" id="avatar-initial"></div>
        <div class="identity-text">
          <div class="name" id="identity-name"></div>
          <div class="details" id="identity-details"></div>
        </div>
      </div>
      <div class="header-buttons">
        <button class="btn-inventory" id="inventory-btn">Faire des vérifications</button>
        <button class="btn-logout" id="logout-btn">Déconnexion</button>
      </div>
    </div>

    <!-- Administrateurs -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Administrateurs</h2>
          <span class="badge" id="admin-count">0</span>
        </div>
        <div class="actions" id="admin-actions"></div>
      </div>
      <ul class="list" id="admin-list"></ul>
      <div class="show-more" id="admin-show-more" style="display:none;">Afficher plus</div>
    </div>

    <!-- Utilisateurs -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Utilisateurs</h2>
          <span class="badge" id="user-count">0</span>
        </div>
        <div class="actions" id="user-actions"></div>
      </div>
      <ul class="list" id="user-list"></ul>
      <div class="show-more" id="user-show-more" style="display:none;">Afficher plus</div>
    </div>

    <!-- Inventaires -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Inventaires</h2>
          <span class="badge" id="inventory-count">0</span>
        </div>
      </div>
      <ul class="list" id="inventory-list"></ul>
      <div class="show-more" id="inventory-show-more" style="display:none;">Afficher plus</div>
    </div>

    <!-- Périmés -->
    <div class="section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h2>Périmés</h2>
          <span class="badge" id="expired-count">0</span>
        </div>
      </div>
      <ul class="list" id="expired-list"></ul>
      <div class="show-more" id="expired-show-more" style="display:none;">Afficher plus</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const HIERARCHY = ['Dieu', 'PUL', 'MOT'];
    const ITEMS_PER_PAGE = 2;

    function getHierarchyLevel(fonction) {
      const idx = HIERARCHY.indexOf(fonction);
      return idx === -1 ? HIERARCHY.length : idx;
    }

    function isStrictlyAbove(myFonc, targetFonc) {
      return getHierarchyLevel(myFonc) < getHierarchyLevel(targetFonc);
    }

    function isAboveOrEqual(myFonc, targetFonc) {
      return getHierarchyLevel(myFonc) <= getHierarchyLevel(targetFonc);
    }

    function canAssignFunction(myFonc, functionToAssign) {
      if (myFonc === 'Dieu') return true;
      if (functionToAssign === 'Dieu') return false;
      if (myFonc === 'PUL') return functionToAssign !== 'PUL';
      if (functionToAssign === 'PUL') return false;
      return isAboveOrEqual(myFonc, functionToAssign);
    }

    let currentAdmin = null;
    let admins = [];
    let users = [];
    let inventories = [];
    let expireds = [];

    // États d'affichage
    let adminShowAll = false;
    let userShowAll = false;
    let inventoryShowAll = false;
    let expiredShowAll = false;

    // DOM
    const avatarInitial = document.getElementById('avatar-initial');
    const identityName = document.getElementById('identity-name');
    const identityDetails = document.getElementById('identity-details');
    const adminCount = document.getElementById('admin-count');
    const userCount = document.getElementById('user-count');
    const inventoryCount = document.getElementById('inventory-count');
    const expiredCount = document.getElementById('expired-count');
    const adminList = document.getElementById('admin-list');
    const userList = document.getElementById('user-list');
    const inventoryList = document.getElementById('inventory-list');
    const expiredList = document.getElementById('expired-list');
    const adminActions = document.getElementById('admin-actions');
    const userActions = document.getElementById('user-actions');
    const adminShowMore = document.getElementById('admin-show-more');
    const userShowMore = document.getElementById('user-show-more');
    const inventoryShowMore = document.getElementById('inventory-show-more');
    const expiredShowMore = document.getElementById('expired-show-more');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');

    // Vérification connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = './login.html'; return; }
      const nivol = user.displayName;
      if (!nivol) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        if (!adminSnap.exists()) {
          await deleteUser(user).catch(() => {});
          window.location.href = './login.html';
          return;
        }

        currentAdmin = {
          nivol,
          nom: adminSnap.data().I || 'Inconnu',
          fonction: adminSnap.data().F || ''
        };

        const initial = (currentAdmin.nom.charAt(0) || '?').toUpperCase();
        avatarInitial.textContent = initial;
        identityName.textContent = currentAdmin.nom;
        identityDetails.textContent = `NIVOL : ${currentAdmin.nivol}${currentAdmin.fonction ? ' · ' + currentAdmin.fonction : ''}`;

        await loadAllData();

      } catch (err) {
        console.error(err);
        if (auth.currentUser) await deleteUser(auth.currentUser).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Déconnexion
    document.getElementById('logout-btn').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Vérifications
    document.getElementById('inventory-btn').addEventListener('click', () => {
      window.location.href = './inventaire';
    });

    async function loadAllData() {
      // Admins
      const adminSnap = await getDocs(collection(db, 'A'));
      admins = [];
      adminSnap.forEach(d => admins.push({ nivol: d.id, nom: d.data().I || 'Inconnu', fonction: d.data().F || '' }));
      renderAdminList();

      // Users
      const userSnap = await getDocs(collection(db, 'U'));
      users = [];
      userSnap.forEach(d => users.push({ nivol: d.id, nom: d.data().I || 'Inconnu' }));
      renderUserList();

      // Inventaires (à adapter selon ta structure Firestore)
      try {
        const invSnap = await getDocs(collection(db, 'inventaires'));
        inventories = [];
        invSnap.forEach(d => inventories.push({ id: d.id, ...d.data() }));
      } catch(e) { inventories = []; }
      renderInventoryList();

      // Périmés (à adapter)
      try {
        const expSnap = await getDocs(collection(db, 'perimes'));
        expireds = [];
        expSnap.forEach(d => expireds.push({ id: d.id, ...d.data() }));
      } catch(e) { expireds = []; }
      renderExpiredList();
    }

    function canEditAnything() {
      if (!currentAdmin) return false;
      return HIERARCHY.includes(currentAdmin.fonction);
    }

    // Rendu liste générique avec show more
    function renderListWithShowMore(items, listEl, showMoreEl, countEl, showAll, toggleFn, renderItemFn) {
      listEl.innerHTML = '';
      countEl.textContent = items.length;

      const visibleItems = showAll ? items : items.slice(0, ITEMS_PER_PAGE);
      visibleItems.forEach(item => renderItemFn(item, listEl));

      if (items.length > ITEMS_PER_PAGE) {
        showMoreEl.style.display = 'block';
        showMoreEl.textContent = showAll ? 'Afficher moins' : `Afficher plus (${items.length - ITEMS_PER_PAGE} restants)`;
        showMoreEl.onclick = toggleFn;
      } else {
        showMoreEl.style.display = 'none';
      }
    }

    // Rendu liste admins
    function renderAdminList() {
      adminActions.innerHTML = '';
      if (canEditAnything()) {
        const btn = document.createElement('button');
        btn.className = 'btn-sm add';
        btn.textContent = '+ Ajouter';
        btn.addEventListener('click', () => openAddModal('A'));
        adminActions.appendChild(btn);
      }

      renderListWithShowMore(admins, adminList, adminShowMore, adminCount, adminShowAll,
        () => { adminShowAll = !adminShowAll; renderAdminList(); },
        (a, listEl) => {
          const li = document.createElement('li');
          li.className = 'list-item';
          li.innerHTML = `
            <div class="user-info">
              <div class="user-avatar">${(a.nom.charAt(0)||'?').toUpperCase()}</div>
              <div>
                <div class="user-name">${a.nom}</div>
                <div class="user-nivol">${a.nivol}</div>
              </div>
              <span class="user-func">${a.fonction || '—'}</span>
            </div>
            <div class="item-actions"></div>
          `;
          const actionsDiv = li.querySelector('.item-actions');
          const canModify = canEditAnything() && (isStrictlyAbove(currentAdmin.fonction, a.fonction) || a.nivol === currentAdmin.nivol);
          const canDelete = canEditAnything() && isStrictlyAbove(currentAdmin.fonction, a.fonction);

          if (canModify) {
            const editBtn = document.createElement('button');
            editBtn.className = 'btn-icon';
            editBtn.textContent = '✏️';
            editBtn.title = 'Modifier';
            editBtn.addEventListener('click', () => openEditModal('A', a));
            actionsDiv.appendChild(editBtn);
          }
          if (canDelete) {
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-icon delete';
            delBtn.textContent = '🗑️';
            delBtn.title = 'Supprimer';
            delBtn.addEventListener('click', () => confirmDelete('A', a));
            actionsDiv.appendChild(delBtn);
          }
          listEl.appendChild(li);
        });
    }

    // Rendu liste users
    function renderUserList() {
      userActions.innerHTML = '';
      if (canEditAnything()) {
        const btn = document.createElement('button');
        btn.className = 'btn-sm add';
        btn.textContent = '+ Ajouter';
        btn.addEventListener('click', () => openAddModal('U'));
        userActions.appendChild(btn);
      }

      renderListWithShowMore(users, userList, userShowMore, userCount, userShowAll,
        () => { userShowAll = !userShowAll; renderUserList(); },
        (u, listEl) => {
          const li = document.createElement('li');
          li.className = 'list-item';
          li.innerHTML = `
            <div class="user-info">
              <div class="user-avatar">${(u.nom.charAt(0)||'?').toUpperCase()}</div>
              <div>
                <div class="user-name">${u.nom}</div>
                <div class="user-nivol">${u.nivol}</div>
              </div>
            </div>
            <div class="item-actions"></div>
          `;
          const actionsDiv = li.querySelector('.item-actions');
          if (canEditAnything()) {
            const editBtn = document.createElement('button');
            editBtn.className = 'btn-icon';
            editBtn.textContent = '✏️';
            editBtn.title = 'Modifier';
            editBtn.addEventListener('click', () => openEditModal('U', u));
            actionsDiv.appendChild(editBtn);

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-icon delete';
            delBtn.textContent = '🗑️';
            delBtn.title = 'Supprimer';
            delBtn.addEventListener('click', () => confirmDelete('U', u));
            actionsDiv.appendChild(delBtn);
          }
          listEl.appendChild(li);
        });
    }

    // Rendu liste inventaires
    function renderInventoryList() {
      renderListWithShowMore(inventories, inventoryList, inventoryShowMore, inventoryCount, inventoryShowAll,
        () => { inventoryShowAll = !inventoryShowAll; renderInventoryList(); },
        (inv, listEl) => {
          const li = document.createElement('li');
          li.className = 'list-item';
          li.innerHTML = `
            <div class="user-info">
              <div class="user-avatar">📦</div>
              <div>
                <div class="user-name">${inv.nom || inv.id || 'Sans nom'}</div>
                <div class="user-nivol">${inv.date || ''}</div>
              </div>
            </div>
          `;
          listEl.appendChild(li);
        });
    }

    // Rendu liste périmés
    function renderExpiredList() {
      renderListWithShowMore(expireds, expiredList, expiredShowMore, expiredCount, expiredShowAll,
        () => { expiredShowAll = !expiredShowAll; renderExpiredList(); },
        (exp, listEl) => {
          const li = document.createElement('li');
          li.className = 'list-item';
          li.innerHTML = `
            <div class="user-info">
              <div class="user-avatar">⚠️</div>
              <div>
                <div class="user-name">${exp.nom || exp.id || 'Sans nom'}</div>
                <div class="user-nivol">${exp.date || ''}</div>
              </div>
            </div>
          `;
          listEl.appendChild(li);
        });
    }

    // Modal Ajouter
    function openAddModal(collectionName) {
      const isAdmin = collectionName === 'A';
      modalContent.innerHTML = `
        <h3>Ajouter un ${isAdmin ? 'administrateur' : 'utilisateur'}</h3>
        <input type="text" id="modal-nivol" placeholder="NIVOL (12 car.)" pattern="[0-9A-Za-z]{12}" maxlength="12">
        <input type="text" id="modal-nom" placeholder="Prénom Nom">
        ${isAdmin ? '<input type="text" id="modal-fonction" placeholder="Fonction">' : ''}
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Ajouter</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nivol = document.getElementById('modal-nivol').value.trim().toUpperCase();
        const nom = document.getElementById('modal-nom').value.trim();
        const fonction = isAdmin ? document.getElementById('modal-fonction').value.trim() : '';

        if (!/^[0-9A-Z]{12}$/.test(nivol)) return alert('NIVOL invalide (12 caractères alphanumériques)');
        if (!nom) return alert('Nom requis');

        if (isAdmin && fonction && !canAssignFunction(currentAdmin.fonction, fonction)) {
          return alert(`Vous ne pouvez pas attribuer la fonction "${fonction}".`);
        }

        const [existsInA, existsInU] = await Promise.all([
          getDoc(doc(db, 'A', nivol)),
          getDoc(doc(db, 'U', nivol))
        ]);
        if (existsInA.exists() || existsInU.exists()) {
          return alert('Ce NIVOL existe déjà.');
        }

        try {
          const data = { I: nom };
          if (isAdmin && fonction) data.F = fonction;
          await setDoc(doc(db, collectionName, nivol), data);
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Modal Modifier
    function openEditModal(collectionName, item) {
      const isAdmin = collectionName === 'A';
      const isSelf = item.nivol === currentAdmin.nivol;

      modalContent.innerHTML = `
        <h3>Modifier ${item.nom}</h3>
        <input type="text" id="modal-nom" value="${item.nom}" placeholder="Prénom Nom">
        ${isAdmin ? `<input type="text" id="modal-fonction" value="${item.fonction || ''}" placeholder="Fonction">` : ''}
        <p style="font-size:0.85rem;color:#666;">NIVOL : ${item.nivol} (non modifiable)</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Enregistrer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nom = document.getElementById('modal-nom').value.trim();
        const fonctionInput = isAdmin ? document.getElementById('modal-fonction') : null;
        const nouvelleFonction = fonctionInput ? fonctionInput.value.trim() : undefined;

        if (!nom) return alert('Nom requis');

        if (isAdmin && nouvelleFonction !== undefined) {
          const oldFonction = item.fonction || '';
          if (isSelf && nouvelleFonction !== oldFonction) {
            return alert('Vous ne pouvez pas modifier votre propre fonction.');
          }
          if (!isSelf && nouvelleFonction !== oldFonction) {
            if (!canAssignFunction(currentAdmin.fonction, nouvelleFonction)) {
              return alert(`Vous ne pouvez pas attribuer la fonction "${nouvelleFonction}".`);
            }
          }
        }

        try {
          const data = { I: nom };
          if (isAdmin && nouvelleFonction !== undefined) data.F = nouvelleFonction;
          await setDoc(doc(db, collectionName, item.nivol), data, { merge: true });
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Confirmation suppression
    function confirmDelete(collectionName, item) {
      if (item.nivol === currentAdmin.nivol) {
        return alert('Vous ne pouvez pas vous supprimer vous-même.');
      }

      modalContent.innerHTML = `
        <h3>Confirmer la suppression</h3>
        <p>Supprimer définitivement <strong>${item.nom}</strong> (${item.nivol}) ?</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-danger" id="modal-delete">Supprimer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-delete').addEventListener('click', async () => {
        try {
          await deleteDoc(doc(db, collectionName, item.nivol));
          closeModal();
          await loadAllData();
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function closeModal() {
      modalOverlay.style.display = 'none';
      modalContent.innerHTML = '';
    }

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  </script>
</body>
</html>
