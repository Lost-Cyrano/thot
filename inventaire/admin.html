<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Gestion des inventaires</title>
  <style>
    :root {
      --red: #e60000;
      --red-hover: #b30000;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ddd;
      --text: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-back {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-back:hover { background: #eee; }

    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: var(--red); color: #fff; }

    .btn-add {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-add:hover { background: var(--red-hover); }

    /* Liste des inventaires */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 14px 18px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .list { list-style: none; }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 10px;
      transition: background 0.2s;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }

    .item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-icon {
      font-size: 1.5rem;
    }

    .item-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .item-id {
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: 1.5px solid #ccc;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.delete:hover { color: var(--red); border-color: var(--red); background: #fff0f0; }

    .badge {
      font-size: 0.75rem;
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 10px;
      color: var(--text-light);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 1.1rem; }

    .modal input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal .hint {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-cancel { background: #eee; color: #333; }
    .btn-cancel:hover { background: #ddd; }
    .btn-save { background: var(--red); color: #fff; }
    .btn-save:hover { background: var(--red-hover); }
    .btn-danger { background: #c00; color: #fff; }
    .btn-danger:hover { background: #a00; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* Responsive */
    @media (max-width: 480px) {
      .list-item { flex-direction: column; align-items: flex-start; }
      .item-actions { align-self: flex-end; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-weight:600;">📋 Gestion des inventaires</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-back" id="btn-admin">← Administration</button>
        <button class="btn-logout" id="btn-logout">Déconnexion</button>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn-add" id="btn-create">+ Créer un inventaire</button>
    </div>

    <!-- Liste des inventaires -->
    <div class="section">
      <div class="section-header">
        <span>Inventaires disponibles</span>
        <span class="badge" id="inventory-count">0</span>
      </div>
      <div id="inventory-list">
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>Chargement...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const HIERARCHY = ['Dieu', 'PUL', 'MOT'];

    function getHierarchyLevel(fonction) {
      const idx = HIERARCHY.indexOf(fonction);
      return idx === -1 ? HIERARCHY.length : idx;
    }

    let currentAdmin = null;
    let inventories = [];

    // DOM
    const inventoryList = document.getElementById('inventory-list');
    const inventoryCount = document.getElementById('inventory-count');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');

    // Vérification connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = './login.html';
        return;
      }
      const nivol = user.displayName;
      if (!nivol) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        if (!adminSnap.exists()) {
          await deleteUser(user).catch(() => {});
          window.location.href = './login.html';
          return;
        }

        currentAdmin = {
          nivol,
          nom: adminSnap.data().I || 'Inconnu',
          fonction: adminSnap.data().F || ''
        };

        // Vérifier que l'admin a le droit de gérer les inventaires
        if (!HIERARCHY.includes(currentAdmin.fonction)) {
          alert('Vous n\'avez pas les droits pour gérer les inventaires.');
          window.location.href = './admin.html';
          return;
        }

        await loadInventories();

      } catch (err) {
        console.error(err);
        if (auth.currentUser) await deleteUser(auth.currentUser).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Déconnexion
    document.getElementById('btn-logout').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Retour admin
    document.getElementById('btn-admin').addEventListener('click', () => {
      window.location.href = './admin.html';
    });

    // Créer un inventaire
    document.getElementById('btn-create').addEventListener('click', () => {
      openCreateModal();
    });

    // Charger les inventaires
    async function loadInventories() {
      try {
        const snap = await getDocs(collection(db, 'I'));
        inventories = [];
        snap.forEach(docSnap => {
          const data = docSnap.data();
          inventories.push({
            id: docSnap.id,
            nom: data.nom || docSnap.id,
            objets: data.objets || {},
            logs: data.logs || []
          });
        });
        renderInventoryList();
      } catch(e) {
        console.error(e);
        inventoryList.innerHTML = '<div class="empty-state"><p>Erreur lors du chargement.</p></div>';
      }
    }

    function renderInventoryList() {
      inventoryCount.textContent = inventories.length;

      if (inventories.length === 0) {
        inventoryList.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>Aucun inventaire pour le moment.</p>
          </div>
        `;
        return;
      }

      let html = '<ul class="list">';
      inventories.forEach(inv => {
        const catCount = Object.keys(inv.objets).length;
        let objCount = 0;
        Object.values(inv.objets).forEach(cat => {
          objCount += Object.keys(cat).length;
        });

        html += `
          <li class="list-item">
            <div class="item-info">
              <span class="item-icon">📋</span>
              <div>
                <div class="item-name">${inv.nom}</div>
                <div class="item-id">ID: ${inv.id} · ${catCount} catégorie(s) · ${objCount} objet(s)</div>
              </div>
            </div>
            <div class="item-actions">
              <button class="btn-icon" data-action="edit" data-id="${inv.id}" title="Modifier">✏️</button>
              <button class="btn-icon" data-action="inventory" data-id="${inv.id}" title="Faire l'inventaire">📦</button>
              <button class="btn-icon delete" data-action="delete" data-id="${inv.id}" title="Supprimer">🗑️</button>
            </div>
          </li>
        `;
      });
      html += '</ul>';
      inventoryList.innerHTML = html;

      // Événements
      document.querySelectorAll('.btn-icon[data-action="edit"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const inv = inventories.find(i => i.id === btn.dataset.id);
          if (inv) openEditModal(inv);
        });
      });

      document.querySelectorAll('.btn-icon[data-action="inventory"]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `./inventaire.html?inv=${encodeURIComponent(btn.dataset.id)}`;
        });
      });

      document.querySelectorAll('.btn-icon[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const inv = inventories.find(i => i.id === btn.dataset.id);
          if (inv) openDeleteModal(inv);
        });
      });
    }

    // Modal Créer
    function openCreateModal() {
      modalContent.innerHTML = `
        <h3>Créer un inventaire</h3>
        <div>
          <label style="font-weight:600;display:block;margin-bottom:4px;">ID de l'inventaire</label>
          <input type="text" id="modal-id" placeholder="ex: lot-a, vpsp, armoire-1">
          <p class="hint">L'ID sert d'identifiant unique (lettres, chiffres, tirets).<br>Il sera utilisé dans l'URL.</p>
        </div>
        <div>
          <label style="font-weight:600;display:block;margin-bottom:4px;">Nom affiché</label>
          <input type="text" id="modal-nom" placeholder="ex: Lot A, VPSP, Armoire 1">
          <p class="hint">Le nom visible par les utilisateurs.</p>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Créer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const id = document.getElementById('modal-id').value.trim().toLowerCase().replace(/\s+/g, '-');
        const nom = document.getElementById('modal-nom').value.trim();

        if (!id) return alert('L\'ID est requis.');
        if (!/^[a-z0-9-]+$/.test(id)) return alert('L\'ID ne doit contenir que des lettres minuscules, chiffres et tirets.');
        if (!nom) return alert('Le nom est requis.');

        // Vérifier que l'ID n'existe pas déjà
        const exists = await getDoc(doc(db, 'I', id));
        if (exists.exists()) {
          return alert('Cet ID existe déjà.');
        }

        try {
          await setDoc(doc(db, 'I', id), {
            nom: nom,
            objets: {},
            logs: [{
              n: currentAdmin.nivol,
              t: new Date().toISOString(),
              a: `Création de l'inventaire "${nom}"`
            }]
          });
          closeModal();
          await loadInventories();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Modal Modifier
    function openEditModal(inv) {
      modalContent.innerHTML = `
        <h3>Modifier l'inventaire</h3>
        <p style="color:var(--text-light);">ID : <strong>${inv.id}</strong> (non modifiable)</p>
        <div>
          <label style="font-weight:600;display:block;margin-bottom:4px;">Nom affiché</label>
          <input type="text" id="modal-nom" value="${inv.nom}">
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Enregistrer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nom = document.getElementById('modal-nom').value.trim();
        if (!nom) return alert('Le nom est requis.');

        try {
          // Ajouter le log
          const snap = await getDoc(doc(db, 'I', inv.id));
          const currentLogs = snap.data().logs || [];
          currentLogs.push({
            n: currentAdmin.nivol,
            t: new Date().toISOString(),
            a: `Renommage : "${inv.nom}" → "${nom}"`
          });

          await updateDoc(doc(db, 'I', inv.id), {
            nom: nom,
            logs: currentLogs.slice(-50)
          });
          closeModal();
          await loadInventories();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    // Modal Supprimer
    function openDeleteModal(inv) {
      const catCount = Object.keys(inv.objets).length;
      let objCount = 0;
      Object.values(inv.objets).forEach(cat => { objCount += Object.keys(cat).length; });

      modalContent.innerHTML = `
        <h3>Supprimer l'inventaire</h3>
        <p>Voulez-vous vraiment supprimer <strong>${inv.nom}</strong> ?</p>
        <p style="color:var(--text-light);">Cet inventaire contient <strong>${catCount} catégorie(s)</strong> et <strong>${objCount} objet(s)</strong>.</p>
        <p style="color:var(--red);font-weight:600;">Cette action est irréversible.</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-danger" id="modal-delete">Supprimer définitivement</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-delete').addEventListener('click', async () => {
        try {
          await deleteDoc(doc(db, 'I', inv.id));
          closeModal();
          await loadInventories();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function closeModal() {
      modalOverlay.style.display = 'none';
      modalContent.innerHTML = '';
    }

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  </script>
</body>
</html>
