<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Gestion des inventaires</title>
  <style>
    :root {
      --red: #e60000;
      --red-hover: #b30000;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ddd;
      --text: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --warning: #f5a623;
      --danger: #e60000;
      --ok: #4caf50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-back {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-back:hover { background: #eee; }

    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: var(--red); color: #fff; }

    .btn-add {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-add:hover { background: var(--red-hover); }

    /* Sélecteur d'inventaire */
    .inventory-selector {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .inventory-selector select {
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
    }

    /* Sections */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 14px 18px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .list { list-style: none; }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }

    .obj-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .obj-name { font-weight: 600; }

    .obj-date {
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .date-ok { color: var(--ok); }
    .date-warning { color: var(--warning); font-weight: 600; }
    .date-danger { color: var(--danger); font-weight: 700; }

    .obj-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      line-height: 1;
    }

    .qty-btn:hover { background: #f0f0f0; }

    .qty-num {
      font-weight: 600;
      font-size: 1.1rem;
      min-width: 30px;
      text-align: center;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: 1.5px solid #ccc;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.delete:hover { color: var(--red); border-color: var(--red); background: #fff0f0; }

    .btn-add-obj {
      background: transparent;
      border: 1.5px dashed #ccc;
      color: var(--text-light);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      width: 100%;
      margin-top: 4px;
    }

    .btn-add-obj:hover { border-color: var(--red); color: var(--red); }

    .badge {
      font-size: 0.75rem;
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 10px;
      color: var(--text-light);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* Logs */
    .logs-section { margin-top: 8px; }

    .logs-section summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.9rem;
      padding: 8px 0;
    }

    .log-item {
      font-size: 0.8rem;
      color: var(--text-light);
      padding: 4px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 1.1rem; }

    .modal label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    .modal input {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal .hint {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-cancel { background: #eee; color: #333; }
    .btn-cancel:hover { background: #ddd; }
    .btn-save { background: var(--red); color: #fff; }
    .btn-save:hover { background: var(--red-hover); }
    .btn-danger { background: #c00; color: #fff; }
    .btn-danger:hover { background: #a00; }

    /* Responsive */
    @media (max-width: 480px) {
      .list-item { flex-direction: column; align-items: flex-start; }
      .obj-quantity { align-self: flex-end; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-weight:600;">📋 Gestion des inventaires</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-back" id="btn-admin">← Administration</button>
        <button class="btn-logout" id="btn-logout">Déconnexion</button>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div class="inventory-selector">
        <select id="inventory-select">
          <option value="">— Choisir un inventaire —</option>
        </select>
        <button class="btn-back" id="btn-rename-inv" title="Renommer" style="display:none;">✏️</button>
        <button class="btn-icon delete" id="btn-delete-inv" title="Supprimer" style="display:none;">🗑️</button>
      </div>
      <button class="btn-add" id="btn-create">+ Créer</button>
    </div>

    <!-- Contenu de l'inventaire sélectionné -->
    <div id="inventory-content">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Sélectionnez un inventaire pour voir son contenu.</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, setDoc, deleteDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const HIERARCHY = ['Dieu', 'PUL', 'MOT'];

    let currentAdmin = null;
    let inventories = [];
    let currentInventoryId = null;
    let currentInventoryData = null;

    // DOM
    const inventorySelect = document.getElementById('inventory-select');
    const inventoryContent = document.getElementById('inventory-content');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    const btnRenameInv = document.getElementById('btn-rename-inv');
    const btnDeleteInv = document.getElementById('btn-delete-inv');

    // Vérification connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = './login.html'; return; }
      const nivol = user.displayName;
      if (!nivol) {
        await deleteUser(user).catch(() => {});
        window.location.href = '../login.html';
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        if (!adminSnap.exists()) {
          await deleteUser(user).catch(() => {});
          window.location.href = '../login.html';
          return;
        }

        currentAdmin = {
          nivol,
          nom: adminSnap.data().I || 'Inconnu',
          fonction: adminSnap.data().F || ''
        };

        await loadInventories();

      } catch (err) {
        console.error(err);
        if (auth.currentUser) await deleteUser(auth.currentUser).catch(() => {});
        window.location.href = '../login.html';
      }
    });

    // Déconnexion
    document.getElementById('btn-logout').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await deleteUser(user).catch(() => {});
        window.location.href = '../login.html';
      }
    });

    // Retour admin
    document.getElementById('btn-admin').addEventListener('click', () => {
      window.location.href = '../admin.html';
    });

    // Créer
    document.getElementById('btn-create').addEventListener('click', () => openCreateModal());

    // Sélection inventaire
    inventorySelect.addEventListener('change', () => {
      const invId = inventorySelect.value;
      if (invId) {
        selectInventory(invId);
      } else {
        currentInventoryId = null;
        currentInventoryData = null;
        btnRenameInv.style.display = 'none';
        btnDeleteInv.style.display = 'none';
        inventoryContent.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>Sélectionnez un inventaire pour voir son contenu.</p>
          </div>
        `;
      }
    });

    // Renommer
    btnRenameInv.addEventListener('click', () => {
      if (currentInventoryId && currentInventoryData) {
        openRenameModal();
      }
    });

    // Supprimer
    btnDeleteInv.addEventListener('click', () => {
      if (currentInventoryId && currentInventoryData) {
        openDeleteModal();
      }
    });

    // ========== FONCTIONS ==========

    async function loadInventories() {
      try {
        const snap = await getDocs(collection(db, 'I'));
        inventories = [];
        snap.forEach(docSnap => {
          const data = docSnap.data();
          inventories.push({
            id: docSnap.id,
            nom: data.nom || docSnap.id,
            objets: data.objets || {},
            logs: data.logs || []
          });
        });

        // Mettre à jour le select
        const currentVal = inventorySelect.value;
        inventorySelect.innerHTML = '<option value="">— Choisir un inventaire —</option>';
        inventories.forEach(inv => {
          const selected = inv.id === currentVal ? ' selected' : '';
          inventorySelect.innerHTML += `<option value="${inv.id}"${selected}>${inv.nom}</option>`;
        });

        // Si un inventaire était sélectionné, rafraîchir
        if (currentInventoryId) {
          const stillExists = inventories.find(i => i.id === currentInventoryId);
          if (stillExists) {
            currentInventoryData = stillExists;
            renderInventoryContent();
          } else {
            currentInventoryId = null;
            currentInventoryData = null;
            btnRenameInv.style.display = 'none';
            btnDeleteInv.style.display = 'none';
            inventoryContent.innerHTML = '<div class="empty-state"><p>Cet inventaire n\'existe plus.</p></div>';
          }
        }
      } catch(e) {
        console.error(e);
      }
    }

    function selectInventory(invId) {
      const inv = inventories.find(i => i.id === invId);
      if (!inv) return;
      currentInventoryId = invId;
      currentInventoryData = inv;
      btnRenameInv.style.display = 'inline-block';
      btnDeleteInv.style.display = 'inline-block';
      renderInventoryContent();
    }

    function getDateStatus(dateStr) {
      if (!dateStr) return null;
      const now = new Date();
      const date = new Date(dateStr);
      const diffDays = Math.ceil((date - now) / (1000 * 60 * 60 * 24));
      if (diffDays <= 0) return 'danger';
      if (diffDays <= 7) return 'danger';
      if (diffDays <= 30) return 'warning';
      return 'ok';
    }

    function getDateLabel(dateStr) {
      if (!dateStr) return '';
      const status = getDateStatus(dateStr);
      const formatted = new Date(dateStr).toLocaleDateString('fr-FR');
      if (status === 'danger') return `⚠️ ${formatted} — PÉRIMÉ`;
      if (status === 'warning') return `🟠 ${formatted} — Proche`;
      return `🟢 ${formatted}`;
    }

    function getDateClass(dateStr) {
      const status = getDateStatus(dateStr);
      if (status === 'danger') return 'date-danger';
      if (status === 'warning') return 'date-warning';
      return 'date-ok';
    }

    function renderInventoryContent() {
      if (!currentInventoryData) return;

      const objets = currentInventoryData.objets || {};
      const categories = Object.keys(objets);

      let html = '';

      if (categories.length === 0) {
        html += '<div class="empty-state"><p>Aucun objet dans cet inventaire.</p></div>';
      }

      categories.forEach(cat => {
        const items = objets[cat];
        const itemKeys = Object.keys(items);

        html += `
          <div class="section">
            <div class="section-header">
              <span>📁 ${cat}</span>
              <div style="display:flex;gap:6px;align-items:center;">
                <span class="badge">${itemKeys.length} objet(s)</span>
                <button class="btn-icon delete delete-cat" data-cat="${cat}" title="Supprimer la catégorie">🗑️</button>
              </div>
            </div>
            <ul class="list">
        `;

        itemKeys.forEach(objName => {
          const obj = items[objName];
          const q = obj.q || 0;
          const d = obj.d || null;

          html += `
            <li class="list-item" data-cat="${cat}" data-obj="${objName}">
              <div class="obj-info">
                <span class="obj-name">${objName}</span>
                ${d ? `<span class="obj-date ${getDateClass(d)}">${getDateLabel(d)}</span>` : '<span class="obj-date" style="color:#999;">Pas de date</span>'}
              </div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <div class="obj-quantity">
                  <button class="qty-btn qty-minus" data-cat="${cat}" data-obj="${objName}">−</button>
                  <span class="qty-num">${q}</span>
                  <button class="qty-btn qty-plus" data-cat="${cat}" data-obj="${objName}">+</button>
                </div>
                <div class="item-actions">
                  <button class="btn-icon edit-obj" data-cat="${cat}" data-obj="${objName}" title="Modifier">✏️</button>
                  <button class="btn-icon delete delete-obj" data-cat="${cat}" data-obj="${objName}" title="Supprimer">🗑️</button>
                </div>
              </div>
            </li>
          `;
        });

        html += `
            </ul>
            <button class="btn-add-obj add-obj" data-cat="${cat}">+ Ajouter un objet</button>
          </div>
        `;
      });

      // Bouton ajouter catégorie
      html += `
        <div style="text-align:center;margin-top:8px;">
          <button class="btn-add" id="btn-add-cat">+ Nouvelle catégorie</button>
        </div>
      `;

      // Logs
      const logs = currentInventoryData.logs || [];
      if (logs.length > 0) {
        html += `
          <details class="logs-section">
            <summary>Historique (${logs.length})</summary>
            ${logs.slice().reverse().map(l => `
              <div class="log-item">${new Date(l.t).toLocaleString('fr-FR')} — ${l.n} — ${l.a}</div>
            `).join('')}
          </details>
        `;
      }

      inventoryContent.innerHTML = html;

      // Attacher les événements
      attachContentEvents();
    }

    function attachContentEvents() {
      // Quantité +
      document.querySelectorAll('.qty-plus').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateQuantity(btn.dataset.cat, btn.dataset.obj, 1);
        });
      });

      // Quantité -
      document.querySelectorAll('.qty-minus').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateQuantity(btn.dataset.cat, btn.dataset.obj, -1);
        });
      });

      // Modifier objet
      document.querySelectorAll('.edit-obj').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openEditObjectModal(btn.dataset.cat, btn.dataset.obj);
        });
      });

      // Supprimer objet
      document.querySelectorAll('.delete-obj').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteObject(btn.dataset.cat, btn.dataset.obj);
        });
      });

      // Ajouter objet
      document.querySelectorAll('.add-obj').forEach(btn => {
        btn.addEventListener('click', () => {
          openAddObjectModal(btn.dataset.cat);
        });
      });

      // Supprimer catégorie
      document.querySelectorAll('.delete-cat').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteCategory(btn.dataset.cat);
        });
      });

      // Ajouter catégorie
      const btnAddCat = document.getElementById('btn-add-cat');
      if (btnAddCat) {
        btnAddCat.addEventListener('click', openAddCategoryModal);
      }
    }

    // ========== ACTIONS SUR LES OBJETS ==========

    async function updateQuantity(cat, objName, delta) {
      const obj = currentInventoryData.objets[cat][objName];
      const currentQty = obj.q || 0;
      const newQty = Math.max(0, currentQty + delta);

      try {
        await updateDoc(doc(db, 'I', currentInventoryId), {
          [`objets.${cat}.${objName}.q`]: newQty
        });
        await addLog(`Qté ${objName} (${cat}): ${currentQty} → ${newQty}`);
        currentInventoryData.objets[cat][objName].q = newQty;
        await loadInventories();
        renderInventoryContent();
      } catch(e) {
        alert('Erreur : ' + e.message);
      }
    }

    async function deleteObject(cat, objName) {
      if (!confirm(`Supprimer "${objName}" de la catégorie "${cat}" ?`)) return;

      try {
        await updateDoc(doc(db, 'I', currentInventoryId), {
          [`objets.${cat}.${objName}`]: deleteField()
        });
        await addLog(`Suppression de "${objName}" (${cat})`);
        delete currentInventoryData.objets[cat][objName];
        if (Object.keys(currentInventoryData.objets[cat]).length === 0) {
          delete currentInventoryData.objets[cat];
        }
        await loadInventories();
        renderInventoryContent();
      } catch(e) {
        alert('Erreur : ' + e.message);
      }
    }

    async function deleteCategory(cat) {
      const count = Object.keys(currentInventoryData.objets[cat] || {}).length;
      if (!confirm(`Supprimer la catégorie "${cat}" et ses ${count} objet(s) ?`)) return;

      try {
        await updateDoc(doc(db, 'I', currentInventoryId), {
          [`objets.${cat}`]: deleteField()
        });
        await addLog(`Suppression de la catégorie "${cat}" (${count} objets)`);
        delete currentInventoryData.objets[cat];
        await loadInventories();
        renderInventoryContent();
      } catch(e) {
        alert('Erreur : ' + e.message);
      }
    }

    async function addLog(action) {
      const log = {
        n: currentAdmin.nivol,
        t: new Date().toISOString(),
        a: action
      };
      try {
        const snap = await getDoc(doc(db, 'I', currentInventoryId));
        const currentLogs = snap.data().logs || [];
        currentLogs.push(log);
        const trimmed = currentLogs.slice(-50);
        await updateDoc(doc(db, 'I', currentInventoryId), { logs: trimmed });
        if (currentInventoryData) currentInventoryData.logs = trimmed;
      } catch(e) {
        console.error('Log error:', e);
      }
    }

    // ========== MODALS ==========

    function openCreateModal() {
      modalContent.innerHTML = `
        <h3>Créer un inventaire</h3>
        <div>
          <label>ID de l'inventaire</label>
          <input type="text" id="modal-id" placeholder="ex: lot-a, vpsp">
          <p class="hint">Identifiant unique (lettres minuscules, chiffres, tirets).</p>
        </div>
        <div>
          <label>Nom affiché</label>
          <input type="text" id="modal-nom" placeholder="ex: Lot A, VPSP">
          <p class="hint">Le nom visible par les utilisateurs.</p>
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Créer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const id = document.getElementById('modal-id').value.trim().toLowerCase().replace(/\s+/g, '-');
        const nom = document.getElementById('modal-nom').value.trim();

        if (!id || !/^[a-z0-9-]+$/.test(id)) return alert('ID invalide (lettres minuscules, chiffres, tirets).');
        if (!nom) return alert('Nom requis.');

        const exists = await getDoc(doc(db, 'I', id));
        if (exists.exists()) return alert('Cet ID existe déjà.');

        try {
          await setDoc(doc(db, 'I', id), {
            nom: nom,
            objets: {},
            logs: [{
              n: currentAdmin.nivol,
              t: new Date().toISOString(),
              a: `Création de l'inventaire "${nom}"`
            }]
          });
          closeModal();
          await loadInventories();
          inventorySelect.value = id;
          selectInventory(id);
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function openRenameModal() {
      modalContent.innerHTML = `
        <h3>Renommer l'inventaire</h3>
        <p class="hint">ID : ${currentInventoryId} (non modifiable)</p>
        <div>
          <label>Nom affiché</label>
          <input type="text" id="modal-nom" value="${currentInventoryData.nom}">
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Enregistrer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nom = document.getElementById('modal-nom').value.trim();
        if (!nom) return alert('Nom requis.');

        try {
          await addLog(`Renommage : "${currentInventoryData.nom}" → "${nom}"`);
          await updateDoc(doc(db, 'I', currentInventoryId), { nom });
          closeModal();
          await loadInventories();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function openDeleteModal() {
      const catCount = Object.keys(currentInventoryData.objets || {}).length;
      let objCount = 0;
      Object.values(currentInventoryData.objets || {}).forEach(cat => { objCount += Object.keys(cat).length; });

      modalContent.innerHTML = `
        <h3>Supprimer l'inventaire</h3>
        <p>Voulez-vous vraiment supprimer <strong>${currentInventoryData.nom}</strong> ?</p>
        <p class="hint">${catCount} catégorie(s) · ${objCount} objet(s)</p>
        <p style="color:var(--red);font-weight:600;">Action irréversible.</p>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-danger" id="modal-delete">Supprimer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-delete').addEventListener('click', async () => {
        try {
          await deleteDoc(doc(db, 'I', currentInventoryId));
          closeModal();
          currentInventoryId = null;
          currentInventoryData = null;
          btnRenameInv.style.display = 'none';
          btnDeleteInv.style.display = 'none';
          await loadInventories();
          inventorySelect.value = '';
          inventoryContent.innerHTML = '<div class="empty-state"><p>Sélectionnez un inventaire.</p></div>';
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function openAddObjectModal(cat) {
      modalContent.innerHTML = `
        <h3>Ajouter un objet dans "${cat}"</h3>
        <div><label>Nom</label><input type="text" id="modal-nom" placeholder="Nom de l'objet"></div>
        <div><label>Quantité</label><input type="number" id="modal-qty" value="1" min="0"></div>
        <div><label>Date de péremption</label><input type="date" id="modal-date"><p class="hint">Optionnel</p></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Ajouter</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const nom = document.getElementById('modal-nom').value.trim();
        const qty = parseInt(document.getElementById('modal-qty').value) || 0;
        const date = document.getElementById('modal-date').value;

        if (!nom) return alert('Nom requis.');

        const objData = { q: qty };
        if (date) objData.d = date;

        try {
          await updateDoc(doc(db, 'I', currentInventoryId), {
            [`objets.${cat}.${nom}`]: objData
          });
          await addLog(`Ajout de "${nom}" (${cat}, qté:${qty}${date ? ', date:'+date : ''})`);
          closeModal();
          await loadInventories();
          renderInventoryContent();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function openEditObjectModal(cat, objName) {
      const obj = currentInventoryData.objets[cat][objName];
      modalContent.innerHTML = `
        <h3>Modifier "${objName}"</h3>
        <div><label>Nom</label><input type="text" id="modal-nom" value="${objName}"></div>
        <div><label>Quantité</label><input type="number" id="modal-qty" value="${obj.q || 0}" min="0"></div>
        <div>
          <label>Date de péremption</label>
          <input type="date" id="modal-date" value="${obj.d || ''}">
          ${obj.d ? '<p class="hint" style="color:var(--red);cursor:pointer;" id="remove-date">🗑️ Supprimer la date</p>' : '<p class="hint">Optionnel</p>'}
        </div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Enregistrer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      // Supprimer la date
      const removeDateBtn = document.getElementById('remove-date');
      if (removeDateBtn) {
        removeDateBtn.addEventListener('click', () => {
          document.getElementById('modal-date').value = '';
          removeDateBtn.style.display = 'none';
        });
      }

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const newName = document.getElementById('modal-nom').value.trim();
        const qty = parseInt(document.getElementById('modal-qty').value) || 0;
        const date = document.getElementById('modal-date').value;

        if (!newName) return alert('Nom requis.');

        const objData = { q: qty };
        if (date) objData.d = date;

        try {
          const updates = {};
          // Si le nom change, supprimer l'ancien
          if (newName !== objName) {
            updates[`objets.${cat}.${objName}`] = deleteField();
          }
          updates[`objets.${cat}.${newName}`] = objData;

          await updateDoc(doc(db, 'I', currentInventoryId), updates);
          await addLog(`Modification de "${objName}" → "${newName}" (${cat}, qté:${qty}${date ? ', date:'+date : ''})`);
          closeModal();
          await loadInventories();
          renderInventoryContent();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function openAddCategoryModal() {
      modalContent.innerHTML = `
        <h3>Nouvelle catégorie</h3>
        <div><label>Nom</label><input type="text" id="modal-cat-name" placeholder="ex: Tiroir Bilan"></div>
        <div class="modal-actions">
          <button class="btn btn-cancel" id="modal-cancel">Annuler</button>
          <button class="btn btn-save" id="modal-save">Créer</button>
        </div>
      `;
      modalOverlay.style.display = 'flex';

      document.getElementById('modal-cancel').addEventListener('click', closeModal);
      document.getElementById('modal-save').addEventListener('click', async () => {
        const catName = document.getElementById('modal-cat-name').value.trim();
        if (!catName) return alert('Nom requis.');
        if (currentInventoryData.objets && currentInventoryData.objets[catName]) {
          return alert('Cette catégorie existe déjà.');
        }

        try {
          await updateDoc(doc(db, 'I', currentInventoryId), {
            [`objets.${catName}`]: {}
          });
          await addLog(`Création catégorie "${catName}"`);
          closeModal();
          await loadInventories();
          renderInventoryContent();
        } catch(e) {
          alert('Erreur : ' + e.message);
        }
      });
    }

    function closeModal() {
      modalOverlay.style.display = 'none';
      modalContent.innerHTML = '';
    }

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  </script>
</body>
</html>
