<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Gestion des inventaires</title>
  <style>
    :root {
      --red: #e60000;
      --red-hover: #b30000;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #ddd;
      --text: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --warning: #f5a623;
      --danger: #e60000;
      --ok: #4caf50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-back {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-back:hover { background: #eee; }

    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1.5px solid var(--red);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: var(--red); color: #fff; }

    /* Sélecteur d'inventaire */
    .inventory-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .inventory-selector select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      cursor: pointer;
      min-width: 200px;
    }

    /* Section */
    .section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 14px 18px;
      background: #fafafa;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .section-header .cat-actions {
      display: flex;
      gap: 6px;
    }

    .list { list-style: none; }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 8px;
      transition: background 0.2s;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafafa; }

    .item-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .item-icon { font-size: 1.3rem; flex-shrink: 0; }

    .item-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .item-qty {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-left: 6px;
    }

    .item-date {
      font-size: 0.75rem;
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .date-ok { background: #e8f5e9; color: #2e7d32; }
    .date-warning { background: #fff3e0; color: #e65100; font-weight: 600; }
    .date-danger { background: #ffebee; color: #c62828; font-weight: 700; }

    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: 1.5px solid #ccc;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.edit:hover { border-color: #4caf50; color: #4caf50; }
    .btn-icon.delete:hover { color: var(--red); border-color: var(--red); background: #fff0f0; }

    .btn-sm {
      background: transparent;
      border: 1.5px solid #ccc;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-sm:hover { background: #eee; }
    .btn-sm.add { border-color: var(--red); color: var(--red); }
    .btn-sm.add:hover { background: var(--red); color: #fff; }
    .btn-sm.danger { border-color: #c00; color: #c00; }
    .btn-sm.danger:hover { background: #c00; color: #fff; }

    .btn-add {
      background: var(--red);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-add:hover { background: var(--red-hover); }

    .badge {
      font-size: 0.75rem;
      background: #f0f0f0;
      padding: 3px 8px;
      border-radius: 10px;
      color: var(--text-light);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal h3 { font-size: 1.1rem; }

    .modal label {
      font-weight: 600;
      display: block;
      margin-bottom: 2px;
      font-size: 0.9rem;
    }

    .modal input, .modal select {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal .hint {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    .modal .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal .checkbox-row input[type="checkbox"] {
      width: auto;
      accent-color: var(--red);
    }

    .modal .checkbox-row label {
      font-weight: 400;
      cursor: pointer;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-cancel { background: #eee; color: #333; }
    .btn-cancel:hover { background: #ddd; }
    .btn-save { background: var(--red); color: #fff; }
    .btn-save:hover { background: var(--red-hover); }
    .btn-danger { background: #c00; color: #fff; }
    .btn-danger:hover { background: #a00; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    /* Logs */
    .logs-section { margin-top: 8px; }

    .logs-section summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.9rem;
      padding: 8px 0;
    }

    .log-item {
      font-size: 0.8rem;
      color: var(--text-light);
      padding: 4px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .list-item { flex-direction: column; align-items: flex-start; }
      .item-actions { align-self: flex-end; }
      .header { flex-direction: column; align-items: flex-start; }
      .inventory-selector { width: 100%; }
      .inventory-selector select { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span style="font-weight:600;">📋 Gestion des inventaires</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-back" id="btn-admin">← Administration</button>
        <button class="btn-logout" id="btn-logout">Déconnexion</button>
      </div>
    </div>

    <!-- Sélecteur + Créer -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div class="inventory-selector">
        <label style="font-weight:600;white-space:nowrap;">Inventaire :</label>
        <select id="inventory-select">
          <option value="">— Sélectionner —</option>
        </select>
      </div>
      <button class="btn-add" id="btn-create">+ Créer un inventaire</button>
    </div>

    <!-- Contenu de l'inventaire sélectionné -->
    <div id="inventory-content">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Sélectionnez un inventaire pour voir son contenu.</p>
      </div>
    </div>

    <!-- Logs -->
    <div id="logs-container"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, setDoc, deleteDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1V3UybXWyyMmO9fBH7jhuVUSFL3mDBPo",
      authDomain: "crf--thot.firebaseapp.com",
      projectId: "crf--thot",
      storageBucket: "crf--thot.firebasestorage.app",
      messagingSenderId: "242106713414",
      appId: "1:242106713414:web:76f4c6977264539ef85147",
      measurementId: "G-NF6W8FS69P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const HIERARCHY = ['Dieu', 'PUL', 'MOT'];

    let currentAdmin = null;
    let inventories = [];
    let currentInventoryId = null;
    let currentInventoryData = null;

    // DOM
    const inventorySelect = document.getElementById('inventory-select');
    const inventoryContent = document.getElementById('inventory-content');
    const logsContainer = document.getElementById('logs-container');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');

    // Vérification connexion
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = './login.html';
        return;
      }
      const nivol = user.displayName;
      if (!nivol) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'A', nivol));
        if (!adminSnap.exists()) {
          await deleteUser(user).catch(() => {});
          window.location.href = './login.html';
          return;
        }

        currentAdmin = {
          nivol,
          nom: adminSnap.data().I || 'Inconnu',
          fonction: adminSnap.data().F || ''
        };

        if (!HIERARCHY.includes(currentAdmin.fonction)) {
          alert('Vous n\'avez pas les droits pour gérer les inventaires.');
          window.location.href = './admin.html';
          return;
        }

        await loadInventoriesList();

      } catch (err) {
        console.error(err);
        if (auth.currentUser) await deleteUser(auth.currentUser).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Déconnexion
    document.getElementById('btn-logout').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (user) {
        await deleteUser(user).catch(() => {});
        window.location.href = './login.html';
      }
    });

    // Retour admin
    document.getElementById('btn-admin').addEventListener('click', () => {
      window.location.href = './admin.html';
    });

    // Créer inventaire
    document.getElementById('btn-create').addEventListener('click', () => openCreateInventoryModal());

    // Changement de sélection
    inventorySelect.addEventListener('change', () => {
      const id = inventorySelect.value;
      if (id) {
        currentInventoryId = id;
        loadInventoryContent(id);
      } else {
        currentInventoryId = null;
        currentInventoryData = null;
        inventoryContent.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Sélectionnez un inventaire pour voir son contenu.</p></div>';
        logsContainer.innerHTML = '';
      }
    });

    // Charger la liste des inventaires
    async function loadInventoriesList() {
      try {
        const snap = await getDocs(collection(db, 'I'));
        inventories = [];
        snap.forEach(docSnap => {
          const data = docSnap.data();
          inventories.push({
            id: docSnap.id,
            nom: data.nom || docSnap.id,
            objets: data.objets || {},
            logs: data.logs || []
          });
        });

        inventorySelect.innerHTML = '<option value="">— Sélectionner —</option>';
        inventories.forEach(inv => {
          const option = document.createElement('option');
          option.value = inv.id;
          option.textContent = inv.nom;
          if (inv.id === currentInventoryId) option.selected = true;
          inventorySelect.appendChild(option);
        });

        // Si un inventaire était sélectionné, recharger
        if (currentInventoryId) {
          const stillExists = inventories.find(i => i.id === currentInventoryId);
          if (stillExists) {
            loadInventoryContent(currentInventoryId);
          } else {
            currentInventoryId = null;
            inventoryContent.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>Sélectionnez un inventaire pour voir son contenu.</p></div>';
            logsContainer.innerHTML = '';
          }
        }
      } catch(e) {
        console.error(e);
      }
    }

    // Charger le contenu d'un inventaire
    async function loadInventoryContent(id) {
      try {
        const snap = await getDoc(doc(db, 'I', id));
        if (!snap.exists()) {
          inventoryContent.innerHTML = '<p>Inventaire introuvable.</p>';
          return;
        }
        currentInventoryData = snap.data();
        currentInventoryId = id;
        renderInventoryContent();
        renderLogs();
      } catch(e) {
        inventoryContent.innerHTML = '<p>Erreur lors du chargement.</p>';
      }
    }

    // Déterminer statut date
    function getDateStatus(dateStr) {
      if (!dateStr) return null;
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const date = new Date(dateStr);
      date.setHours(0, 0, 0, 0);
      const diffDays = Math.ceil((date - now) / (1000 * 60 * 60 * 24));
      if (diffDays <= 0) return 'danger';
      if (diffDays <= 7) return 'danger';
      if (diffDays <= 30) return 'warning';
      return 'ok';
    }

    function getDateClass(dateStr) {
      const status = getDateStatus(dateStr);
      if (status === 'danger') return 'date-danger';
      if (status === 'warning') return 'date-warning';
      return 'date-ok';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // Rendu du contenu
    function renderInventoryContent() {
      const objets = currentInventoryData.objets || {};
      const categories = Object.keys(objets);

      let html = '';

      // Actions globales
      html += `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
          <div>
            <span style="font-weight:600;">📦 ${currentInventoryData.nom || currentInventoryId}</span>
            <span class="badge" style="margin-left:8px;">${categories.length} cat.</span>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-sm" id="btn-rename-inv">✏️ Renommer</button>
            <button class="btn-sm danger" id="btn-delete-inv">🗑️ Supprimer</button>
          </div>
        </div>
      `;

      if (categories.length === 0) {
        html += '<div class="empty-state"><p>Aucun objet dans cet inventaire.</p></div>';
      }

      categories.forEach(cat => {
        const items = objets[cat];
        const itemKeys = Object.keys(items);

        html += `
          <div class="section">
            <div class="section-header">
              <span>📁 ${cat}</span>
              <div class="cat-actions">
                <span style="font-size:0.85rem;color:var(--text-light);">${itemKeys.length} objet(s)</span>
                <button class="btn-sm" data-action="rename-cat" data-cat="${cat}" title="Renommer">✏️</button>
                <button class="btn-sm danger" data-action="delete-cat" data-cat="${cat}" title="Supprimer">🗑️</button>
              </div>
            </div>
            <ul class="list">
        `;

        itemKeys.forEach(objName => {
          const obj = items[objName];
          const q = obj.q || 0;
          const d = obj.d || null;

          html += `
            <li class="list-item">
              <div class="item-info">
                <span class="item-icon">📦</span>
                <div>
                  <span class="item-name">${objName}</span>
                  <span class="item-qty">×${q}</span>
                  ${d ? `<span class="item-date ${getDateClass(d)}">${formatDate(d)}</span>` : ''}
                </div>
              </div>
              <div class="item-actions">
                <button class="btn-icon edit" data-action="edit-obj" data-cat="${cat}" data-obj="${objName}" title="Modifier">✏️</button>
                <button class="btn-icon delete" data-action="delete-obj" data-cat="${cat}" data-obj="${objName}" title="Supprimer">🗑️</button>
              </div>
            </li>
          `;
        });

        html += `
            </ul>
            <button class="btn-sm add" data-action="add-obj" data-cat="${cat}" style="margin:8px;">+ Ajouter un objet</button>
          </div>
        `;
      });

      // Bouton nouvelle catégorie
      html += `
        <div style="text-align:center;margin-top:12px;">
          <button class="btn-add" id="btn-add-cat">+ Nouvelle catégorie</button>
        </div>
      `;

      inventoryContent.innerHTML = html;

      // Attacher événements
      attachContentEvents();
    }

    function attachContentEvents() {
      // Renommer inventaire
      const btnRename = document.getElementById('btn-rename-inv');
      if (btnRename) {
        btnRename.addEventListener('click', () => openRenameInventoryModal());
      }

      // Supprimer inventaire
      const btnDelete = document.getElementById('btn-delete-inv');
      if (btnDelete) {
        btnDelete.addEventListener('click', () => openDeleteInventoryModal());
      }

      // Renommer catégorie
      document.querySelectorAll('[data-action="rename-cat"]').forEach(btn => {
        btn.addEventListener('click', () => openRenameCategoryModal(btn.dataset.cat));
      });

      // Supprimer catégorie
      document.querySelectorAll('[data-act
