<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thot – Page introuvable</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 450px;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #e60000;
      line-height: 1;
      margin-bottom: 10px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .error-message {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .countdown {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      background: #e60000;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #b30000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="error-title">Page introuvable</div>
    <div class="error-message">La page que vous cherchez n'existe pas ou a été déplacée.</div>
    <div class="countdown" id="countdown">Redirection vers la connexion dans 3 secondes...</div>
    <a href="./login.html" class="btn">Se connecter</a>
  </div>

  <script>
    let seconds = 3;
    const countdownEl = document.getElementById('countdown');

    const interval = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = './login.html';
      } else {
        countdownEl.textContent = `Redirection vers la connexion dans ${seconds} seconde${seconds > 1 ? 's' : ''}...`;
      }
    }, 1000);
  </script>
</body>
</html>
